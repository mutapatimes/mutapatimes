name = "academy-grade"
main = "worker.js"
compatibility_date = "2024-11-01"

# The Gemini API key is a secret, NOT a var. It is the same key value as the
# GEMINI_API_KEY GitHub Actions secret, but Cloudflare cannot read GitHub
# secrets, so set it here once:
#   npx wrangler secret put GEMINI_API_KEY
# Never commit the key to this file or anywhere in the repo.

[vars]
ALLOWED_ORIGIN = "https://mutapatimes.com"
MODEL = "gemini-2.5-flash"
