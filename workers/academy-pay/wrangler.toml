name = "academy-pay"
main = "worker.js"
compatibility_date = "2024-11-01"

# Create the KV namespace, then paste its id below:
#   npx wrangler kv namespace create ACADEMY
[[kv_namespaces]]
binding = "ACADEMY"
id = "PASTE_KV_NAMESPACE_ID_HERE"

# Secrets (do NOT commit): set with `npx wrangler secret put NAME`
#   LS_WEBHOOK_SECRET - Lemon Squeezy webhook signing secret
#   ACCESS_SECRET     - any long random string (signs access tokens + referral codes)
#   ADMIN_KEY         - any long random string; needed to generate local-payment access codes

[vars]
# Your Lemon Squeezy product buy link, e.g.
# https://YOURSTORE.lemonsqueezy.com/buy/0000-uuid
LS_BUY_LINK = "https://YOURSTORE.lemonsqueezy.com/buy/REPLACE-WITH-VARIANT-UUID"
# Optional: a Lemon Squeezy discount code for referred friends (e.g. FRIEND15)
LS_DISCOUNT_CODE = ""
PRICE = "15"
REF_DISCOUNT = "0.15"
SITE_URL = "https://mutapatimes.com"
ALLOWED_ORIGIN = "https://mutapatimes.com"
# NEWSLETTER_WEBHOOK = "https://your-newsletter-endpoint"  # Mailchimp proxy, Zapier, Make, etc.
