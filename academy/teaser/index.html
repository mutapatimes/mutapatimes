<!doctype html>
<html class="no-js" lang="en">
<head>
  <meta charset="utf-8">
  <title>Free taster — Mutapa Times Academy</title>
  <link rel="canonical" href="https://mutapatimes.com/academy/teaser/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="description" content="Try a free taster of the Mutapa Times Academy journalism course. A few real questions, then sign up to complete the course.">
  <meta name="robots" content="noindex, follow">
  <link rel="apple-touch-icon" href="/icon.png?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/normalize.css">
  <link rel="stylesheet" href="/css/main.css?v=102">
  <link rel="stylesheet" href="/academy/academy.css?v=17">
</head>
<body>
  <header class="ac-appbar">
    <div class="ac-appbar-in">
      <a class="ac-brand" href="/academy/">The Mutapa Times</a>
      <span class="ac-chip">Free taster</span>
    </div>
  </header>

  <main class="ac-wrap"><div id="view"></div></main>

  <script>
  (function () {
    "use strict";
    var IMGBASE = "/img/uploads/image_bank_academy/";
    var view = document.getElementById("view");

    var QUESTIONS = [
      {
        q: "A story reads: \"The bank's new app is the most advanced in the region, the bank said.\" Why is this closer to PR than news?",
        options: [
          "Because it mentions an app",
          "Because the only source is the company praising itself, with no independent check",
          "Because it is too short to be news",
          "Because apps are never newsworthy"
        ],
        answer: 1,
        explain: "An unchecked claim from an interested party, repeated as fact, is promotion. News would verify or attribute and weigh it."
      },
      {
        q: "A power utility announces outages of up to 18 hours a day. Which is the strongest lede?",
        options: [
          "The power utility held a briefing on Tuesday about the electricity situation.",
          "Households across the city will face up to 18 hours a day without power, the utility says.",
          "Electricity, a vital resource, is once again in the news this week.",
          "In a move that has surprised many, changes are coming to the power supply."
        ],
        answer: 1,
        explain: "Lead with the concrete impact and who it affects. The others bury the news in process or vague throat-clearing."
      },
      {
        q: "Two sources give you the same striking figure. You can treat it as verified only when:",
        options: [
          "Both of them read it in the same press release",
          "They are independent of each other and of the original claim",
          "One of them is very senior",
          "It matches what you already expected"
        ],
        answer: 1,
        explain: "Two people repeating one source is still one source. Independent corroboration is what counts."
      },
      {
        q: "A leaked document names a junior employee who blew the whistle; naming them could put them at risk. The most ethical choice is to:",
        options: [
          "Publish the name, since accuracy means full detail",
          "Report the substance but withhold the identifying detail that is not essential",
          "Drop the story entirely to be safe",
          "Publish the name with a disclaimer"
        ],
        answer: 1,
        explain: "Minimise harm without losing the public-interest story. Identifying a vulnerable source rarely serves the reader."
      },
      {
        q: "Which sentence is correct?",
        options: [
          "The committee gave its report to the board, who's members welcomed it.",
          "The committee gave its report to the board, whose members welcomed it.",
          "The committee gave it's report to the board, whose members welcomed it.",
          "The committee gave its report to the board, whom members welcomed it."
        ],
        answer: 1,
        explain: "Whose shows possession; who's means who is. And its (no apostrophe) is the possessive."
      },
      {
        q: "A wire story headlined \"Africa's economy\" draws all its examples from just two countries. The main problem is that it:",
        options: [
          "Is too positive about the continent",
          "Treats a whole continent as one place, erasing the differences between dozens of countries",
          "Mentions the economy at all",
          "Is simply too long"
        ],
        answer: 1,
        explain: "This is the 'Africa is one country' trope. Name the country and give its specific context."
      },
      {
        q: "An outlet runs a government press release almost word for word as a news story. The biggest journalistic problem is that it:",
        options: [
          "Is shorter than usual",
          "Publishes an interested party's version unchecked, letting them set the agenda",
          "Used a press release, which is never allowed",
          "Should have been labelled an opinion piece"
        ],
        answer: 1,
        explain: "Repeating one side unchecked hands them the agenda. A reporter verifies, adds context and seeks other voices."
      }
    ];

    function el(t, c, x) { var e = document.createElement(t); if (c) e.className = c; if (x != null) e.textContent = x; return e; }
    function clear(n) { while (n.firstChild) n.removeChild(n.firstChild); }

    var idx = 0, correct = 0;

    function intro() {
      clear(view);
      view.appendChild(el("p", "ac-eyebrow", "Free taster"));
      view.appendChild(el("h1", "ac-h1", "Try a few real questions from the course"));
      var fig = el("figure", "ac-hero-img"); var im = document.createElement("img");
      im.src = IMGBASE + "generic-journalist-writing-1.jpg"; im.alt = ""; fig.appendChild(im);
      view.appendChild(fig);
      var card = el("section", "ac-card");
      card.appendChild(el("p", null, "Seven real questions to test your instincts. Some are tricky on purpose. No signup needed, and at the end you can join to complete the full course."));
      var acts = el("div", "ac-actions");
      var b = el("button", "ac-btn ac-btn--lg", "Start the taster");
      b.addEventListener("click", run); acts.appendChild(b); card.appendChild(acts);
      view.appendChild(card);
      window.scrollTo(0, 0);
    }

    function run() {
      clear(view);
      if (idx >= QUESTIONS.length) return finish();
      var ex = QUESTIONS[idx];
      var dots = el("div", "ac-dots");
      for (var d = 0; d < QUESTIONS.length; d++) dots.appendChild(el("span", "ac-dot" + (d < idx ? " done" : d === idx ? " active" : "")));
      view.appendChild(dots);
      var card = el("section", "ac-card ac-slidein");
      card.appendChild(el("p", "ac-kicker", "Question " + (idx + 1) + " of " + QUESTIONS.length));
      card.appendChild(el("p", "ac-q", ex.q));
      var opts = el("div", "ac-opts"); var locked = false;
      ex.options.forEach(function (text, i) {
        var btn = el("button", "ac-opt"); btn.type = "button"; btn.textContent = text;
        btn.addEventListener("click", function () {
          if (locked) return; locked = true;
          var btns = opts.querySelectorAll(".ac-opt");
          btns.forEach(function (b) { b.disabled = true; });
          btns[ex.answer].classList.add("is-correct");
          if (i !== ex.answer) btns[i].classList.add("is-wrong"); else correct++;
          var exp = el("p", "ac-explain " + (i === ex.answer ? "good" : "bad"));
          exp.textContent = (i === ex.answer ? "Correct. " : "Not quite. ") + ex.explain;
          card.appendChild(exp);
          var acts = el("div", "ac-actions");
          var c = el("button", "ac-btn", idx === QUESTIONS.length - 1 ? "See result" : "Continue");
          c.addEventListener("click", function () { idx++; run(); });
          acts.appendChild(c); card.appendChild(acts);
        });
        opts.appendChild(btn);
      });
      card.appendChild(opts);
      view.appendChild(card);
      window.scrollTo(0, 0);
    }

    function finish() {
      clear(view);
      var fig = el("figure", "ac-hero-img"); var im = document.createElement("img");
      im.src = IMGBASE + "busy-newsroom.jpg"; im.alt = ""; fig.appendChild(im);
      view.appendChild(fig);
      var card = el("section", "ac-card");
      card.appendChild(el("p", "mark", "M·T"));
      var h = el("h2", null, correct >= 6 ? "You're a natural." : (correct >= 4 ? "Strong instincts." : "Good effort."));
      h.style.fontFamily = '"Playfair Display", Georgia, serif';
      card.appendChild(h);
      card.appendChild(el("p", null, "You scored " + correct + " of " + QUESTIONS.length + " on a deliberately tough taster. The full course is 13 units, 54 lessons and over 200 exercises, ending in a certificate and a path to a published byline."));
      var acts = el("div", "ac-actions");
      var join = el("a", "ac-btn ac-btn--lg", "Sign up to complete the course");
      join.setAttribute("href", "/academy/#signup");
      var more = el("a", "ac-btn ac-btn--ghost", "See what's inside");
      more.setAttribute("href", "/academy/");
      acts.appendChild(join); acts.appendChild(more); card.appendChild(acts);
      view.appendChild(card);
      window.scrollTo(0, 0);
    }

    intro();
  })();
  </script>
</body>
</html>
