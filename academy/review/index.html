<!doctype html>
<html class="no-js" lang="en">
<head>
  <meta charset="utf-8">
  <title>Course review — Mutapa Times Academy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/normalize.css">
  <link rel="stylesheet" href="/css/main.css?v=102">
  <link rel="stylesheet" href="/academy/academy.css?v=5">
  <style>
    .rv-gate { max-width: 420px; margin: 0 auto; padding: 4rem 1.2rem; text-align: center; }
    .rv-gate h1 { font-family: "Playfair Display", Georgia, serif; font-weight: 900; font-size: 1.6rem; margin: 0 0 .4rem; }
    .rv-gate p { color: #6a6a6a; margin: 0 0 1.4rem; }
    .rv-input { width: 100%; font: inherit; border: 1.5px solid var(--rule); border-radius: 10px; padding: .8rem .9rem; background: #fff; color: var(--ink); margin: 0 0 .8rem; }
    .rv-input:focus { outline: none; border-color: var(--ink); }
    .rv-btn { width: 100%; background: var(--accent); color: #fff; border: 0; cursor: pointer; font: inherit; font-weight: 700; font-size: 1.02rem; padding: .85rem 1.4rem; border-radius: 99px; }
    .rv-err { color: var(--accent); font-weight: 600; font-size: .9rem; min-height: 1.2em; margin: .6rem 0 0; }
    .rv-badge { font-size: .68rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; background: var(--accent); color: #fff; padding: .3rem .6rem; border-radius: 99px; }
    #app[hidden] { display: none; }
  </style>
</head>
<body>
  <!-- Password gate -->
  <div class="rv-gate" id="gate">
    <p class="rv-badge" style="display:inline-block;margin-bottom:1rem">Tutor review access</p>
    <h1>Mutapa Times Academy</h1>
    <p>Enter the review password to explore the full course with no gates: every lesson, every question, pass or fail freely.</p>
    <form id="gateForm">
      <input class="rv-input" id="pw" type="password" placeholder="Review password" autocomplete="off">
      <button class="rv-btn" type="submit">View the course</button>
      <p class="rv-err" id="err"></p>
    </form>
  </div>

  <!-- The course app (revealed after password) -->
  <div id="app" hidden>
    <header class="ac-appbar">
      <div class="ac-appbar-in">
        <a class="ac-brand" href="/academy/">The Mutapa Times</a>
        <div class="ac-chips">
          <span class="ac-chip" style="background:var(--accent);color:#fff">REVIEW MODE</span>
          <span class="ac-chip ac-chip--xp" id="xpChip">0 XP</span>
          <span class="ac-chip ac-chip--streak" id="streakChip">0 days</span>
          <button class="ac-chip ac-chip--btn" id="soundBtn" type="button" aria-label="Sound">🔊</button>
          <button class="ac-chip ac-chip--btn" id="resetBtn" type="button" title="Clear review progress">Reset</button>
        </div>
      </div>
    </header>
    <main class="ac-wrap"><div id="view"></div></main>
  </div>

  <script>
  (function () {
    "use strict";
    // SHA-256 of the review password. To change the password, replace this
    // hash (ask for a new one). Current password is shared with you separately.
    var HASH = "a37137a22042c41ebb55bc69a32f6bfa8055aa45c583b532053781689d035097";

    var gate = document.getElementById("gate");
    var app = document.getElementById("app");
    var booted = false;

    async function sha256(str) {
      var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return [].map.call(new Uint8Array(buf), function (b) { return b.toString(16).padStart(2, "0"); }).join("");
    }

    function boot() {
      if (booted) return; booted = true;
      gate.style.display = "none";
      app.hidden = false;
      window.MT_ACADEMY_REVIEW = true;
      var s1 = document.createElement("script"); s1.src = "/academy/course.js?v=11";
      s1.onload = function () { var s2 = document.createElement("script"); s2.src = "/academy/app.js?v=10"; document.body.appendChild(s2); };
      document.body.appendChild(s1);
    }

    document.getElementById("resetBtn") && document.getElementById("resetBtn").addEventListener("click", function () {
      try { localStorage.removeItem("mt_academy_review"); } catch (e) {}
      location.reload();
    });

    // Skip the gate if already unlocked this session.
    try { if (sessionStorage.getItem("mt_review_ok") === "1") boot(); } catch (e) {}

    document.getElementById("gateForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var err = document.getElementById("err");
      sha256(document.getElementById("pw").value).then(function (h) {
        if (h === HASH) { try { sessionStorage.setItem("mt_review_ok", "1"); } catch (e) {} boot(); }
        else { err.textContent = "Wrong password. Try again."; }
      });
    });
  })();
  </script>
</body>
</html>
