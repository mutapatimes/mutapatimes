name: Fetch Job Listings

on:
  schedule:
    # Every 6 hours, offset by 25 minutes so it doesn't collide with the
    # other on-the-hour fetch workflows.
    - cron: '25 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Scrape Zimbabwe job boards
        run: python3 scripts/fetch_jobs.py

      - name: Install Pillow (for job cards)
        run: pip install --quiet Pillow

      - name: Render branded card per job (cached by URL hash)
        run: python3 scripts/build_job_cards.py

      - name: Regenerate feeds so jobs-feed.xml picks up the new listings
        run: python3 scripts/generate_rss.py

      - name: Commit updated jobs + cards + feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json img/cards/jobs/ jobs-feed.xml feed.xml \
                  fx-feed.xml weather-feed.xml economy-feed.xml \
                  business-feed.xml properties-feed.xml
          git diff --cached --quiet || (git commit -m "Update job listings + cards + feeds [automated]" && git push)
