name: Fetch Job Listings

on:
  schedule:
    # Every 6 hours, offset by 25 minutes so it doesn't collide with the
    # other on-the-hour fetch workflows.
    - cron: '25 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Scrape Zimbabwe job boards
        run: python3 scripts/fetch_jobs.py

      - name: Commit updated jobs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --cached --quiet || (git commit -m "Update job listings [automated]" && git push)
