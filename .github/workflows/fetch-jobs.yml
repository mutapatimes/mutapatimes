name: Fetch Job Listings

on:
  schedule:
    # Every 6 hours, offset by 25 minutes so it doesn't collide with the
    # other on-the-hour fetch workflows.
    - cron: '25 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Scrape Zimbabwe job boards
        run: python3 scripts/fetch_jobs.py

      - name: Install Pillow (for job cards)
        run: pip install --quiet Pillow

      - name: Render branded card per job (cached by URL hash)
        run: python3 scripts/build_job_cards.py

      - name: Render 9:16 story cards (for the mixed stories-feed)
        run: python3 scripts/build_story_cards.py

      - name: Build landing pages — /jobs-landing/ + /stories/ (Metricool og:image targets)
        run: |
          python3 scripts/build_jobs_landing_pages.py
          python3 scripts/build_story_landing_pages.py

      - name: Regenerate feeds so jobs-feed.xml + stories-feed.xml pick up the new listings
        run: python3 scripts/generate_rss.py

      - name: Commit updated jobs + cards + feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json img/cards/jobs/ img/cards/stories/ stories/ jobs-landing/ \
                  jobs-feed.xml stories-feed.xml feed.xml \
                  fx-feed.xml weather-feed.xml economy-feed.xml \
                  business-feed.xml properties-feed.xml
          if ! git diff --cached --quiet; then
            git commit -m "Update job listings + cards + feeds [automated]"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Pushed on attempt $i"
                exit 0
              fi
              echo "Push rejected — rebasing onto remote main (attempt $i/5)"
              git pull --rebase origin main || exit 1
              sleep $((RANDOM % 4 + 2))
            done
            echo "All push attempts failed"
            exit 1
          fi
