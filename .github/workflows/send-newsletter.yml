name: Send Newsletter

on:
  schedule:
    # Monday & Thursday at 07:00 UTC (09:00 CAT)
    - cron: '0 7 * * 1,4'
  workflow_dispatch:  # Manual trigger for testing

jobs:
  zimbabwe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send Zimbabwe newsletter
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
        run: python3 scripts/send_newsletter.py --region zw

  south-africa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Sends to the South Africa Brevo list. Until the BREVO_LIST_ID_ZA secret
      # is set, send_newsletter.py prints "skipping" and exits 0 (green). To add
      # another region, copy this job with its own --region + list-id secret.
      - name: Send South Africa newsletter (skips until SA list configured)
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID_ZA }}
        run: python3 scripts/send_newsletter.py --region za
