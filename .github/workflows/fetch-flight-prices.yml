name: Fetch flight prices

# Pull cheapest cached fares per corridor from the Travelpayouts Data API
# and commit the result to data/flight-prices.json. The rebuild-microsites
# workflow then re-runs the flight builder, which picks up the new data
# and renders the prices into the corridor heroes + AggregateOffer schema.
#
# Requires repo secret: TRAVELPAYOUTS_TOKEN
# Get one at https://www.travelpayouts.com/programs (Tools → API)

on:
  schedule:
    # Twice daily — 06:00 and 18:00 UTC. Travelpayouts caches change slowly.
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-flight-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch flight prices
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
        run: python3 scripts/fetch_flight_prices.py

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/flight-prices.json
          if git diff --cached --quiet; then
            echo "No price changes."
          else
            git commit -m "Update flight prices [automated]"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Pushed."
                break
              else
                echo "Push failed; pulling --rebase and retrying ($i/5)..."
                git pull --rebase
                sleep 2
              fi
            done
          fi
