name: Academy Email Lifecycle

on:
  schedule:
    # Daily at 08:00 UTC (10:00 CAT)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Manual trigger for testing
    inputs:
      dry_run:
        description: 'Dry run (no emails sent)'
        required: false
        default: 'false'

jobs:
  academy-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Academy lifecycle emails
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          SITE_URL: https://mutapatimes.com
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: python3 scripts/academy_lifecycle.py
