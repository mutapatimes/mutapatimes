name: Fetch Property Listings

on:
  schedule:
    # Every 6 hours
    - cron: '15 */6 * * *'
  workflow_dispatch:

jobs:
  fetch-listings:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Scrape property.co.zw houses for sale
        run: python3 scripts/fetch_property_listings.py

      - name: Install Pillow (for hybrid property cards)
        run: pip install --quiet Pillow

      - name: Render hybrid card per listing (photo + brand strip)
        run: python3 scripts/build_property_cards.py
        timeout-minutes: 8

      - name: Render 9:16 story cards (for the mixed stories-feed)
        run: python3 scripts/build_story_cards.py
        timeout-minutes: 8

      - name: Build landing pages — /property-landing/ + /stories/ (Metricool og:image targets)
        run: |
          python3 scripts/build_property_landing_pages.py
          python3 scripts/build_story_landing_pages.py

      - name: Regenerate feeds so properties-feed.xml + stories-feed.xml pick up new listings
        run: python3 scripts/generate_rss.py

      - name: Commit updated listings + cards + feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/property-listings.json img/cards/properties/ img/cards/stories/ stories/ property-landing/ \
                  properties-feed.xml stories-feed.xml feed.xml fx-feed.xml weather-feed.xml \
                  economy-feed.xml business-feed.xml jobs-feed.xml
          if ! git diff --cached --quiet; then
            git commit -m "Update property listings + cards + feeds [automated]"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Pushed on attempt $i"
                exit 0
              fi
              echo "Push rejected — rebasing onto remote main (attempt $i/5)"
              git pull --rebase origin main || exit 1
              sleep $((RANDOM % 4 + 2))
            done
            echo "All push attempts failed"
            exit 1
          fi
