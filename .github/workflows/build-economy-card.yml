name: Build Economy Card

on:
  schedule:
    # 04:35 UTC = 06:35 CAT — well before any morning social slot so the
    # day's card is ready by the time Metricool's autolist polls.
    - cron: '35 4 * * *'
  workflow_dispatch:

jobs:
  build-economy-card:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Pillow (for the snapshot card)
        run: pip install --quiet Pillow

      - name: Render today's economy card (day-of-week rotation)
        run: python3 scripts/build_economy_card.py

      - name: Regenerate feeds so the autolist picks up today's economy item
        run: python3 scripts/generate_rss.py

      - name: Commit updated economy card + feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img/cards/economy-snapshot.png feed.xml economy-feed.xml \
                  fx-feed.xml weather-feed.xml business-feed.xml \
                  jobs-feed.xml properties-feed.xml
          if ! git diff --cached --quiet; then
            git commit -m "Update economy card + feed [automated]"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Pushed on attempt $i"
                exit 0
              fi
              echo "Push rejected — rebasing onto remote main (attempt $i/5)"
              git pull --rebase origin main || exit 1
              sleep $((RANDOM % 4 + 2))
            done
            echo "All push attempts failed"
            exit 1
          fi
