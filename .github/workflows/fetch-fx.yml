name: Fetch FX Rates

on:
  schedule:
    # Every 2 hours. open.er-api.com publishes a fresh daily snapshot
    # around 00:00 UTC, but we poll often enough to be safe and to
    # surface a recent "Updated N min ago" timestamp on the page.
    - cron: '35 */2 * * *'
  workflow_dispatch:

jobs:
  fetch-fx:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch FX rates
        run: python3 scripts/fetch_fx.py

      - name: Install Pillow (for the snapshot card)
        run: pip install --quiet Pillow

      - name: Render daily FX snapshot card
        run: python3 scripts/build_fx_snapshot_card.py

      - name: Regenerate feed.xml so the autolist picks up today's snapshot
        run: python3 scripts/generate_rss.py

      - name: Commit updated FX rates + snapshot card + feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fx-rates.json img/cards/fx-snapshot.png feed.xml fx-feed.xml business-feed.xml jobs-feed.xml properties-feed.xml
          git diff --cached --quiet || (git commit -m "Update FX rates + snapshot card [automated]" && git push)
