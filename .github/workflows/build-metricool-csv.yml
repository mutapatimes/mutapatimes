name: Build Metricool CSV

on:
  schedule:
    # Mon & Thu at 05:00 UTC (07:00 CAT) — early morning so you can review
    # the queue before the first scheduled post (LinkedIn ~09:00 CAT).
    # Mon's batch covers Mon/Tue/Wed (3 days, 15 articles).
    # Thu's batch covers Thu/Fri/Sat/Sun (4 days, 20 articles).
    - cron: '0 5 * * 1,4'
  workflow_dispatch:
    inputs:
      evening_start:
        description: 'Ad-hoc evening run — start time in CAT (HH:MM, e.g. 21:00). Leave blank for the normal multi-day schedule.'
        required: false
        default: ''
      evening_articles:
        description: 'Evening run: how many articles (each posts to all 5 platforms)'
        required: false
        default: '2'
      evening_interval:
        description: 'Evening run: minutes between articles'
        required: false
        default: '30'
      brand_name:
        description: 'Override Metricool brand name. Leave blank to omit (Metricool routes to your default brand).'
        required: false
        default: ''

jobs:
  build-csv:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Pillow
        run: pip install Pillow

      - name: Build Metricool CSV + headline cards
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          METRICOOL_EVENING_START: ${{ inputs.evening_start }}
          METRICOOL_EVENING_ARTICLES: ${{ inputs.evening_articles || '2' }}
          METRICOOL_EVENING_INTERVAL: ${{ inputs.evening_interval || '30' }}
          METRICOOL_BRAND_NAME: ${{ inputs.brand_name }}
        run: python3 scripts/build_metricool_csv.py

      - name: Commit CSV, cards, and queue tracker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/metricool-queue.csv data/.metricool_queued.json img/cards/
          git diff --cached --quiet || (git commit -m "Build Metricool CSV [automated]" && git push)
