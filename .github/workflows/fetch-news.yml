name: Fetch News Data

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Pillow (needed transitively by build_news_pages too)
        run: pip install --quiet Pillow

      - name: Fetch Zimbabwe news
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
          MEDIASTACK_API_KEY: ${{ secrets.MEDIASTACK_API_KEY }}
          PERIGON_API_KEY: ${{ secrets.PERIGON_API_KEY }}
        run: python3 scripts/fetch_news.py

      - name: Build news landing pages
        run: python3 scripts/build_news_pages.py

      - name: Build author pages + manifest (must run before build_static_pages so bylines link)
        run: python3 scripts/build_author_pages.py

      - name: Build static article pages
        run: python3 scripts/build_static_pages.py --articles-only

      - name: Render branded card per feed item (cached by URL hash)
        run: python3 scripts/build_feed_cards.py

      - name: Render 9:16 story cards (mixed business + property + jobs)
        run: python3 scripts/build_story_cards.py

      - name: Build landing pages — /stories/, /jobs-landing/, /property-landing/
        run: |
          python3 scripts/build_story_landing_pages.py
          python3 scripts/build_jobs_landing_pages.py
          python3 scripts/build_property_landing_pages.py

      - name: Build city news pages (Harare, Bulawayo, Mutare, Gweru, Masvingo, Vic Falls)
        run: python3 scripts/build_city_pages.py

      - name: Generate sitemap and RSS feeds
        run: |
          python3 scripts/generate_sitemap.py
          python3 scripts/generate_rss.py

      - name: Stamp cache-busting asset versions (nav.js / main.css)
        run: python3 scripts/stamp_assets.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ content/articles/ news/ articles/ img/cards/news/ img/cards/stories/ \
                  stories/ jobs-landing/ property-landing/ \
                  harare-news.html bulawayo-news.html mutare-news.html \
                  gweru-news.html masvingo-news.html victoria-falls-news.html \
                  sitemap.xml feed.xml fx-feed.xml weather-feed.xml business-feed.xml \
                  jobs-feed.xml properties-feed.xml stories-feed.xml
          if ! git diff --cached --quiet; then
            git commit -m "Update news data + feed cards [automated]"
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Pushed on attempt $i"
                exit 0
              fi
              echo "Push rejected — rebasing onto remote main (attempt $i/5)"
              git pull --rebase origin main || exit 1
              sleep $((RANDOM % 4 + 2))
            done
            echo "All push attempts failed"
            exit 1
          fi

      - name: Send push notification for breaking news
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python3 scripts/send_push.py
